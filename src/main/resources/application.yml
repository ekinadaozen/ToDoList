spring:
  application:
    name: smart-task-manager

  # ── Active Profile ──────────────────────────────────────────────────
  profiles:
    active: postgres   # Switch to 'h2' for In-Memory Database

  # ── JPA / Hibernate ────────────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
    show-sql: false

# ── H2 Profile ─────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:smarttaskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

# ── PostgreSQL Profile ──────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/smarttaskdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# ── Common (all profiles) ──────────────────────────────────────────
---
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION_MS:2400000}   

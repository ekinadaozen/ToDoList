<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>

    <!-- AUTHENTICATION SECTION -->
    <section id="auth-section" class="active">
        <div class="auth-container glass-panel">
            <div class="brand">
                <i class="fa-solid fa-bolt text-gradient"></i>
                <h2>Smart Task</h2>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h3>Welcome Back</h3>
                <p class="subtitle">Enter your details to access your tasks.</p>
                
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="btn-primary">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                
                <p class="switch-form">Don't have an account? <a href="#" id="go-to-register">Sign up</a></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <h3>Create Account</h3>
                <p class="subtitle">Start organizing your life today.</p>
                
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Full Name" required minlength="2">
                </div>

                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-primary">
                    <span>Sign Up</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                
                <p class="switch-form">Already have an account? <a href="#" id="go-to-login">Sign in</a></p>
            </form>
        </div>
        
        <!-- Abstract Background Elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </section>

    <!-- MAIN DASHBOARD -->
    <section id="app-section">
        <nav class="glass-nav">
            <div class="brand">
                <i class="fa-solid fa-bolt text-gradient"></i>
                <h2>Smart Task</h2>
            </div>
            <div class="nav-actions">
                <span id="user-greeting">Hello, User</span>
                <button id="btn-logout" class="btn-icon" title="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </nav>

        <main class="dashboard">
            <div class="dashboard-header">
                <div>
                    <h1 class="text-gradient">Your Tasks</h1>
                    <p class="subtitle" id="task-stats">You have 0 tasks to complete.</p>
                </div>
                <button id="btn-add-task" class="btn-primary">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Task</span>
                </button>
            </div>

            <!-- Kanban Board Style -->
            <div class="task-board">
                <!-- TODO Column -->
                <div class="task-column">
                    <div class="column-header">
                        <div class="dot dot-todo"></div>
                        <h3>To Do</h3>
                        <span class="count" id="count-todo">0</span>
                    </div>
                    <div class="task-list" id="list-todo">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>

                <!-- IN PROGRESS Column -->
                <div class="task-column">
                    <div class="column-header">
                        <div class="dot dot-progress"></div>
                        <h3>In Progress</h3>
                        <span class="count" id="count-progress">0</span>
                    </div>
                    <div class="task-list" id="list-progress">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>

                <!-- DONE Column -->
                <div class="task-column">
                    <div class="column-header">
                        <div class="dot dot-done"></div>
                        <h3>Done</h3>
                        <span class="count" id="count-done">0</span>
                    </div>
                    <div class="task-list" id="list-done">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>
            </div>
        </main>
    </section>

    <!-- TASK MODAL -->
    <div id="task-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Create Task</h3>
                <button id="btn-close-modal" class="btn-icon">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-title">Task Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?">
                </div>
                
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Add some details..."></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="TODO">To Do</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="DONE">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-deadline">Deadline</label>
                        <input type="date" id="task-deadline">
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" id="btn-cancel-task" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
